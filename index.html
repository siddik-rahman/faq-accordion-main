<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@400,600,700&display=swap" rel="stylesheet">

    <title>faq-accordion-main</title>
  </head>
  
    <div id="app"></div>
    

    <script type="module" src="/src/main.js"></script>
    

  <body class="bg-purple-100 min-h-screen font-sans">
  <main class="relative min-h-screen flex justify-center items-center px-6">

    <!-- Top Background -->
    <div
      class="absolute top-0 left-0 w-full h-64
  bg-[url('/faq-accordion-main/images/background-pattern-mobile.svg')]
  md:bg-[url('/faq-accordion-main/images/background-pattern-desktop.svg')]
  bg-cover bg-no-repeat bg-center">
    </div>

    <!-- FAQ Card -->
    <section
      class="relative bg-white mt-24 rounded-lg shadow-lg p-6 w-full max-w-xs justify-center items-center">

      <!-- Title -->
      <div class="flex gap-6">
        <img
          class="mb-6"
          src="./assets/images/icon-star.svg"
          alt="Star icon">
        <h1 class="text-4xl font-bold">FAQs</h1>
      </div>

      <!-- FAQ 1 -->
      <div class="faq">
        <button
          class="faq-header flex justify-between items-center w-full gap-6 mb-4 text-left
                 hover:text-[#AD28EB]
                 focus:outline-none
                 focus:ring-2
                 focus:ring-[#AD28EB]
                 rounded transition-colors duration-200">

          <span class="font-semibold">
            What is Frontend Mentor, and how will it help me?
          </span>

          <img
            class="faq-icon shrink-0"
            src="./assets/images/icon-minus.svg"
            alt="">
        </button>

        <p class="font-['Work_Sans'] text-purple-custom faq-answer mb-4 font-normal text-base leading-6">
          Frontend Mentor offers realistic coding challenges to help
          developers improve their coding skills with projects in HTML,
          CSS, and JavaScript. It's suitable for all levels and ideal
          for portfolio building.
        </p>
      </div>

      <hr class="border-purple-100 my-4">

      <!-- FAQ 2 -->
      <div class="faq">
        <button
          class="faq-header flex justify-between items-center w-full gap-6 mb-4 text-left
                 hover:text-[#AD28EB]
                 focus:outline-none
                 focus:ring-2
                 focus:ring-[#AD28EB]
                 rounded transition-colors duration-200">

          <span class="font-semibold">
            Is Frontend Mentor free?
          </span>

          <img
            class="faq-icon shrink-0"
            src="./assets/images/icon-plus.svg"
            alt="">
        </button>

        <p class="faq-answer hidden"></p>
      </div>

      <hr class="border-purple-100 my-4">

      <!-- FAQ 3 -->
      <div class="faq">
        <button
          class="faq-header flex justify-between items-center w-full gap-6 mb-4 text-left
                 hover:text-[#AD28EB]
                 focus:outline-none
                 focus:ring-2
                 focus:ring-[#AD28EB]
                 rounded transition-colors duration-200">

          <span class="font-semibold">
            Can I use Frontend Mentor projects in my portfolio?
          </span>

          <img
            class="faq-icon shrink-0"
            src="./assets/images/icon-plus.svg"
            alt="">
        </button>

        <p class="faq-answer hidden"></p>
      </div>

      <hr class="border-purple-100 my-4">

      <!-- FAQ 4 -->
      <div class="faq">
        <button
          class="faq-header flex justify-between items-center w-full gap-6 mb-4 text-left
                 hover:text-[#AD28EB]
                 focus:outline-none
                 focus:ring-2
                 focus:ring-[#AD28EB]
                 rounded transition-colors duration-200">

          <span class="font-semibold">
            How can I get help if I'm stuck on a challenge?
          </span>

          <img
            class="faq-icon shrink-0"
            src="./assets/images/icon-plus.svg"
            alt="">
        </button>

        <p class="faq-answer hidden"></p>
      </div>

    </section>
  </main>
</body>
 
</body>
</html>
